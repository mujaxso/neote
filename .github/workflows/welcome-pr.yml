name: Welcome PR

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome message
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const isFirstTimeContributor = pr.author_association === 'FIRST_TIME_CONTRIBUTOR' || 
                                           pr.author_association === 'CONTRIBUTOR';

            if (isFirstTimeContributor) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `## 👋 Welcome to Neote!

Thank you for your contribution to Neote, the AI-first IDE!

We appreciate you taking the time to submit this pull request. Our team will review it as soon as possible.

### 🚀 Quick tips:
- Make sure all CI checks pass
- Follow the existing code style
- Add tests if applicable
- Update documentation if needed

### 📋 Next steps:
1. Wait for maintainers to review your PR
2. Address any feedback if requested
3. Once approved, your changes will be merged!

Thanks again for helping make Neote better! 🎉`
              });
            }
